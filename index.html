<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>OralMed 2026 — Académie des Oraux</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        cream: '#F4F1EB',
        navy: '#1B2A4A',
        sage: '#5C7A62',
        gold: '#C9A84C',
        danger: '#A83232',
      },
      fontFamily: {
        display: ['"Playfair Display"', 'serif'],
        body: ['"DM Sans"', 'sans-serif'],
      }
    }
  }
}
</script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #F4F1EB;
  color: #1B2A4A;
  min-height: 100vh;
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #C9A84C55; border-radius: 4px; }

.hl {
  background: linear-gradient(105deg, #FAEDB5 0%, #F7E490 100%);
  padding: 1px 6px;
  border-radius: 3px;
}

.card {
  background: #fff;
  border-radius: 18px;
  box-shadow: 0 1px 3px rgba(27,42,74,.06), 0 4px 16px rgba(27,42,74,.05);
  transition: box-shadow .25s ease, transform .15s ease;
}
.card-hover:hover {
  box-shadow: 0 4px 24px rgba(27,42,74,.12);
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes slideRight {
  from { opacity:0; transform:translateX(-14px); }
  to   { opacity:1; transform:translateX(0); }
}
@keyframes popIn {
  0%   { opacity:0; transform:scale(.85) translateY(8px); }
  65%  { transform:scale(1.04) translateY(-2px); }
  100% { opacity:1; transform:scale(1) translateY(0); }
}
@keyframes pulse {
  0%,100% { opacity:1; }
  50%      { opacity:.6; }
}

.anim-up   { animation: fadeUp   .45s ease both; }
.anim-side { animation: slideRight .4s ease both; }
.anim-pop  { animation: popIn    .4s ease both; }
.anim-pulse{ animation: pulse 2s ease infinite; }

.acc-body {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows .38s ease;
}
.acc-body.open { grid-template-rows: 1fr; }
.acc-inner { overflow: hidden; }

.timer-ring {
  transition: stroke-dashoffset 1s linear, stroke .6s ease;
  transform: rotate(-90deg);
  transform-origin: 70px 70px;
}

.check-row {
  display: flex; align-items: flex-start; gap: 10px;
  cursor: pointer; padding: 6px 0;
  border-bottom: 1px solid #F3F4F6;
  transition: opacity .2s;
}
.check-row:last-child { border-bottom: none; }
.check-row.checked { opacity: .55; }
.check-row.checked .check-label { text-decoration: line-through; }
.check-box {
  flex-shrink: 0;
  margin-top: 2px;
  width: 20px; height: 20px;
  border-radius: 6px;
  border: 2px solid #D1D5DB;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s ease;
}
.check-box.on {
  border-color: #5C7A62;
  background: #5C7A62;
}

.tag {
  font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 20px;
  background: #F3F4F6; color: #6B7280;
  white-space: nowrap;
}
.tag.Urgence   { background:#FEE2E2; color:#B91C1C; }
.tag.Social    { background:#D1FAE5; color:#065F46; }
.tag.Relationnel { background:#DBEAFE; color:#1E40AF; }
.tag.Ethique   { background:#FEF3C7; color:#92400E; }
.tag.Sante     { background:#EDE9FE; color:#5B21B6; }
.tag.Medical   { background:#CFFAFE; color:#155E75; }
.tag.Familial  { background:#FCE7F3; color:#9D174D; }

.nav-btn { position: relative; transition: opacity .2s; }
.nav-btn.active::after {
  content:'';
  position: absolute;
  bottom: -1px; left: 50%;
  transform: translateX(-50%);
  width: 24px; height: 3px;
  border-radius: 2px;
  background: #1B2A4A;
}

.toggle-track {
  width: 46px; height: 26px; border-radius: 13px;
  background: #D1D5DB;
  position: relative; cursor: pointer;
  transition: background .25s ease;
}
.toggle-track.on { background: #1B2A4A; }
.toggle-thumb {
  position: absolute;
  top: 3px; left: 3px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: white;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
  transition: transform .25s ease;
}
.toggle-track.on .toggle-thumb { transform: translateX(20px); }

.mastery-select {
  border: none; outline: none;
  border-radius: 8px;
  font-size: 11px; font-weight: 600;
  padding: 4px 6px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}

.jury-toast {
  position: fixed;
  top: 20px; left: 50%;
  transform: translateX(-50%);
  z-index: 999;
  animation: popIn .4s ease both;
}

.btn {
  display: block; width: 100%;
  padding: 14px 20px;
  border-radius: 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 600;
  text-align: center;
  cursor: pointer;
  transition: opacity .2s, transform .15s;
  border: none; outline: none;
}
.btn:active { transform: scale(.97); opacity: .9; }
.btn-navy  { background: #1B2A4A; color: #fff; }
.btn-sage  { background: #5C7A62; color: #fff; }
.btn-ghost { background: #fff; color: #1B2A4A; box-shadow: 0 1px 3px rgba(27,42,74,.1); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const SCENARIOS = [
  { id:1, emoji:'👴', titre:'Le Grand-père raciste sur Facebook', tags:['Relationnel','Éthique'], matrice:'C' },
  { id:2, emoji:'🍸', titre:'La sœur baby-sitter ivre', tags:['Urgence','Familial'], matrice:'A' },
  { id:3, emoji:'💔', titre:'Les parents divorcés qui exigent de choisir', tags:['Familial','Relationnel'], matrice:'C' },
  { id:4, emoji:'😴', titre:'L\'aidant familial qui s\'endort au volant', tags:['Urgence','Social'], matrice:'B' },
  { id:5, emoji:'📱', titre:'L\'amie suicidaire après une soirée', tags:['Urgence','Santé'], matrice:'A' },
  { id:6, emoji:'💻', titre:'Le cyberharcèlement par IA', tags:['Urgence','Sécurité'], matrice:'A' },
  { id:7, emoji:'🛒', titre:'Le vol de nourriture au supermarché', tags:['Social','Précarité'], matrice:'B' },
  { id:8, emoji:'🤍', titre:'L\'emprise conjugale', tags:['Urgence','Sécurité'], matrice:'A' },
  { id:9, emoji:'🚨', titre:'Le voisin qui fait un malaise', tags:['Urgence','Médical'], matrice:'A' },
  { id:10, emoji:'📝', titre:'La triche par désespoir', tags:['Éthique','Relationnel'], matrice:'C' },
  { id:11, emoji:'🚗', titre:'L\'alcool au volant après soirée', tags:['Urgence','Sécurité'], matrice:'A' },
  { id:12, emoji:'🚊', titre:'Le handicap invisible dans le tram', tags:['Social','Éthique'], matrice:'C' },
  { id:13, emoji:'📲', titre:'L\'oncle et les fake news médicales', tags:['Santé','Éthique'], matrice:'C' },
  { id:14, emoji:'👦', titre:'L\'enfant maltraité en baby-sitting', tags:['Urgence','Sécurité'], matrice:'A' },
  { id:15, emoji:'📔', titre:'Le colocataire suicidaire', tags:['Urgence','Santé'], matrice:'A' },
  { id:16, emoji:'🎰', titre:'L\'addiction et le chantage du coloc', tags:['Urgence','Sécurité'], matrice:'A' },
  { id:17, emoji:'🏛️', titre:'Le propos raciste au guichet', tags:['Éthique','Social'], matrice:'C' },
  { id:18, emoji:'🍖', titre:'La falsification au restaurant', tags:['Éthique','Sécurité'], matrice:'A' },
  { id:19, emoji:'📋', titre:'L\'éthique et l\'assurance-vie', tags:['Éthique','Relationnel'], matrice:'C' },
  { id:20, emoji:'🎭', titre:'La dérive sectaire amicale', tags:['Santé','Relationnel'], matrice:'C' }
];

const MASTERY = {
  0:{ bg:'#F3F4F6', color:'#9CA3AF', label:'Non travaillé' },
  1:{ bg:'#FEE2E2', color:'#EF4444', label:'À retravailler' },
  2:{ bg:'#FEF3C7', color:'#D97706', label:'En progression' },
  3:{ bg:'#D1FAE5', color:'#059669', label:'Maîtrisé' },
};

function useLS(key, def) {
  const [v, setV] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : def; }
    catch { return def; }
  });
  const set = useCallback(upd => {
    setV(prev => {
      const next = typeof upd === 'function' ? upd(prev) : upd;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  }, [key]);
  return [v, set];
}

function CircularTimer({ total, remaining, running }) {
  const R = 54, C = 2 * Math.PI * R;
  const pct = remaining / total;
  const offset = C * (1 - pct);
  const m = Math.floor(remaining / 60);
  const s = remaining % 60;
  const low = remaining < 60;
  const mid = remaining < 180;
  const strokeColor = low ? '#A83232' : mid ? '#C9A84C' : '#1B2A4A';

  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
      <svg width="140" height="140" viewBox="0 0 140 140">
        <circle cx="70" cy="70" r={R} fill="none" stroke="#F0EDE7" strokeWidth="9"/>
        <circle cx="70" cy="70" r={R} fill="none" stroke={strokeColor} strokeWidth="9"
          strokeLinecap="round" strokeDasharray={C} strokeDashoffset={offset} className="timer-ring"/>
        <text x="70" y="64" textAnchor="middle" fontSize="28" fontWeight="600" fill={strokeColor} fontFamily="DM Sans, sans-serif">
          {String(m).padStart(2,'0')}:{String(s).padStart(2,'0')}
        </text>
        <text x="70" y="82" textAnchor="middle" fontSize="10" fill="#9CA3AF" fontFamily="DM Sans, sans-serif" className={low ? 'anim-pulse' : ''}>
          {running ? (low ? 'TERMINEZ !' : 'EN COURS') : 'EN PAUSE'}
        </text>
      </svg>
    </div>
  );
}

function Gauge({ score, label, color='#1B2A4A' }) {
  const R = 36, C = 2 * Math.PI * R;
  const offset = C * (1 - score / 100);
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
      <svg width="90" height="90" viewBox="0 0 90 90">
        <circle cx="45" cy="45" r={R} fill="none" stroke="#F0EDE7" strokeWidth="7"/>
        <circle cx="45" cy="45" r={R} fill="none" stroke={color} strokeWidth="7"
          strokeLinecap="round" strokeDasharray={C} strokeDashoffset={offset}
          style={{transform:'rotate(-90deg)',transformOrigin:'45px 45px',transition:'stroke-dashoffset 1.2s ease'}}/>
        <text x="45" y="50" textAnchor="middle" fontSize="18" fontWeight="600" fill={color} fontFamily="DM Sans, sans-serif">{score}%</text>
      </svg>
      <span style={{fontSize:11,color:'#6B7280',fontWeight:500,textAlign:'center',maxWidth:72}}>{label}</span>
    </div>
  );
}

function Dashboard({ sessions }) {
  const n = sessions.length;
  const avg = n ? Math.round(sessions.reduce((a,s)=>a+s.score,0)/n) : 0;
  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}} className="anim-up">
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
        {[
          {val:n, label:'Simulations', color:'#1B2A4A'},
          {val:avg+'%', label:'Score moyen', color:'#5C7A62'},
          {val:'Bienvenue', label:'OralMed 2026', color:'#C9A84C'},
        ].map((s,i)=>(
          <div key={i} className="card" style={{padding:'16px 12px',textAlign:'center'}}>
            <div style={{fontSize:30,fontWeight:700,fontFamily:'Playfair Display, serif',color:s.color,lineHeight:1.1}}>{s.val}</div>
            <div style={{fontSize:11,color:'#9CA3AF',fontWeight:500,marginTop:4,textTransform:'uppercase',letterSpacing:'0.06em'}}>{s.label}</div>
          </div>
        ))}
      </div>
      <div className="card" style={{padding:'20px 16px',textAlign:'center'}}>
        <div style={{fontFamily:'Playfair Display, serif',fontWeight:700,fontSize:18,color:'#1B2A4A',marginBottom:16}}>🎯 Académie des Oraux</div>
        <p style={{fontSize:14,color:'#6B7280',lineHeight:1.6}}>Préparez vos scénarios éthiques et cliniques pour les examens oraux médicaux. Entraînez-vous à gérer 20 situations complexes.</p>
      </div>
    </div>
  );
}

function Repertoire() {
  const [mastery, setMastery] = useLS('mastery', {});
  return (
    <div style={{display:'flex',flexDirection:'column',gap:12}} className="anim-up">
      <div className="card" style={{padding:'16px'}}>
        <div style={{fontFamily:'Playfair Display, serif',fontWeight:700,fontSize:18,color:'#1B2A4A',marginBottom:12}}>Répertoire des Scénarios</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8}}>
          {SCENARIOS.map(sc=>{
            const m = mastery[sc.id]||0;
            const {bg,color} = MASTERY[m];
            return (
              <div key={sc.id} style={{background:bg,borderRadius:10,padding:'12px 4px',textAlign:'center',cursor:'pointer'}}>
                <div style={{fontSize:24}}>{sc.emoji}</div>
                <div style={{fontSize:10,fontWeight:700,color,marginTop:4}}>{sc.id}</div>
                <div style={{fontSize:8,color:'#9CA3AF',marginTop:2}}>{MASTERY[m].label}</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [sessions, setSessions] = useLS('sessions', []);
  const [currentTab, setCurrentTab] = useState('dashboard');

  return (
    <div style={{maxWidth:'1200px',margin:'0 auto',padding:'20px'}}>
      <div style={{display:'flex',gap:24,marginBottom:32}}>
        <button onClick={()=>setCurrentTab('dashboard')} className={`nav-btn ${currentTab==='dashboard'?'active':''}`}
          style={{background:'none',border:'none',cursor:'pointer',fontSize:14,fontWeight:600,color:'#1B2A4A'}}>
          Tableau de bord
        </button>
        <button onClick={()=>setCurrentTab('repertoire')} className={`nav-btn ${currentTab==='repertoire'?'active':''}`}
          style={{background:'none',border:'none',cursor:'pointer',fontSize:14,fontWeight:600,color:'#1B2A4A'}}>
          Répertoire
        </button>
      </div>

      {currentTab === 'dashboard' && <Dashboard sessions={sessions} />}
      {currentTab === 'repertoire' && <Repertoire />}

      <div style={{marginTop:40,textAlign:'center',color:'#9CA3AF',fontSize:12}}>
        <p>OralMed 2026 — Académie des Oraux — Préparation aux examens cliniques</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
