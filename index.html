<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Oraux Médecine 2026 — Académie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root{--cream:#F9F8F5;--navy:#1B3A5C;--sage:#5C8B6E;--gold:#D4A843;--red:#C0392B;--border:#E5E0D5;--muted:#8A8070;--surface:#FFFFFF;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--cream);font-family:'DM Sans',sans-serif;color:#1C1C1E;min-height:100vh;}
    .serif{font-family:'Cormorant Garamond',serif;}
    .highlight-gold{background:linear-gradient(180deg,transparent 55%,rgba(212,168,67,.38) 55%);padding:0 2px;}
    .card{background:#fff;border-radius:14px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 14px rgba(0,0,0,.04);}
    .sc-card{cursor:pointer;transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s ease,border-color .2s ease;}
    .sc-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(27,58,92,.13);border-color:rgba(27,58,92,.35);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    .fade-up{animation:fadeUp .32s ease forwards;}
    @keyframes jurySlide{0%{transform:translateX(110%);opacity:0;}15%{transform:translateX(0);opacity:1;}78%{transform:translateX(0);opacity:1;}100%{transform:translateX(110%);opacity:0;}}
    .jury-pop{animation:jurySlide 4.2s ease-in-out forwards;}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:.35;}}
    .urgent{animation:blink 1s ease-in-out infinite;}
    ::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
    .nav-btn{transition:all .18s ease;border-radius:8px;padding:7px 13px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;display:flex;align-items:center;gap:6px;white-space:nowrap;}
    .nav-btn.active{background:var(--navy);color:#fff;}
    .nav-btn:not(.active){color:var(--muted);}
    .nav-btn:not(.active):hover{background:var(--border);color:#1C1C1E;}
    .star-btn{background:none;border:none;cursor:pointer;padding:2px;transition:transform .15s ease;line-height:1;}
    .star-btn:hover{transform:scale(1.25);}
    input[type=checkbox]{appearance:none;width:18px;height:18px;border:2px solid var(--border);border-radius:4px;cursor:pointer;flex-shrink:0;transition:all .18s ease;background:#fff;position:relative;}
    input[type=checkbox]:checked{background:var(--navy);border-color:var(--navy);}
    input[type=checkbox]:checked::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;display:block;text-align:center;line-height:14px;}
    .mbadge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:700;letter-spacing:.4px;}
    .btn-primary{background:var(--navy);color:#fff;border:none;cursor:pointer;border-radius:12px;font-weight:600;font-size:14px;padding:12px 24px;display:inline-flex;align-items:center;gap:8px;transition:opacity .18s ease;}
    .btn-primary:hover{opacity:.9;}
    .btn-secondary{background:var(--border);color:#1C1C1E;border:none;cursor:pointer;border-radius:12px;font-weight:500;font-size:14px;padding:12px 20px;display:inline-flex;align-items:center;gap:8px;transition:background .18s ease;}
    .btn-secondary:hover{background:#D8D3CA;}
    .btn-green{background:var(--sage);color:#fff;border:none;cursor:pointer;border-radius:12px;font-weight:600;font-size:14px;padding:12px 24px;display:inline-flex;align-items:center;gap:8px;}
    .toggle-track{width:46px;height:26px;border-radius:13px;border:none;cursor:pointer;position:relative;transition:background .2s ease;flex-shrink:0;}
    .toggle-thumb{position:absolute;top:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s ease;box-shadow:0 1px 4px rgba(0,0,0,.2);}
    .section-label{font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
    .pill{font-size:12px;padding:4px 12px;border-radius:20px;font-weight:500;}
  </style>
</head>
<body>
<div id="root"></div>
<script>
tailwind.config={corePlugins:{preflight:false},theme:{extend:{colors:{cream:'#F9F8F5',navy:'#1B3A5C',sage:'#5C8B6E',gold:'#D4A843',muted:'#8A8070'}}}};
</script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

/* ══════════════════════════════════════════════════════
   DATA
══════════════════════════════════════════════════════ */
const scenariosData=[
  {id:1,titre:"Cyberharcèlement IA",enonce:"Une excellente élève de ta promo voit une photo d'elle truquée et dégradante tourner sur le groupe WhatsApp de la promo. Son téléphone vibre d'insultes en continu.",correction_partie1:"Clé : Harcèlement destructeur. Matrice A.\n→ Geste : L'isoler dans un parc, loin des regards.\n→ Action : Captures d'écran pour constituer les preuves numériques.\n→ Relais : Signalement plateforme 3018 + accompagnement SIMPPS.\n→ Extra-Mile : Proposer de travailler en binôme tout le semestre pour rompre l'isolement.",questions_jury:["Elle te supplie de pirater le compte de son harceleur pour supprimer la photo. Tu le fais ?","Le harceleur te menace physiquement si tu témoignes à la direction. Quelle est ta réaction ?","Le proviseur te demande d'étouffer l'affaire car le harceleur est le fils d'un grand donateur de l'université."],ripostes:["Refus catégorique — Disque Rayé. C'est illégal. Répondre par un délit nous mettrait en tort et fragiliserait la procédure. Je l'aide à porter plainte par la voie légale.","Ma sécurité est en jeu — Urgence Sécuritaire. Je romps tout contact avec lui et j'ajoute cette menace explicite au dépôt de plainte auprès de la police.","L'éthique prime sur la hiérarchie. Je refuse fermement, je trace mon désaccord par écrit (mail de confirmation), et si besoin, j'alerte les autorités de tutelle compétentes."],matrice:"A",cle:"Harcèlement destructeur"},
  {id:2,titre:"Précarité & Vol étudiant",enonce:"Tu vois une camarade de TD glisser furtivement des paquets de pâtes et des protections hygiéniques dans sa veste au supermarché.",correction_partie1:"Clé : Précarité absolue / Instinct de survie. Matrice B.\n→ Geste : Ne pas l'humilier en public — rester neutre et discret.\n→ Action : Régler la note discrètement en prétextant une erreur de caisse.\n→ Relais : L'orienter vers l'assistante sociale du CROUS.\n→ Extra-Mile : Préparer des Tupperwares de repas chauds pour la semaine.",questions_jury:["Le vigile l'attrape et te demande si tu la connais pour l'identifier.","Elle refuse ton aide financière par fierté et retourne voler le lendemain.","Elle te demande de l'héberger clandestinement dans ta chambre étudiante de 9m² pendant un mois."],ripostes:["Je ne mens pas à la sécurité, mais j'interviens pour calmer le jeu. Je propose de payer immédiatement la marchandise pour éviter l'intervention de la police et protéger sa dignité.","Je respecte son consentement, je ne peux pas la forcer. Je ne l'abandonne pas pour autant : je maintiens le dialogue et lui laisse les contacts des Restos du Cœur.","Refus assertif. Ce n'est pas viable ni sécuritaire, et c'est contraire à mon bail. Je lui avance discrètement de l'argent pour une auberge de jeunesse, ou je contacte le 115 avec elle."],matrice:"B",cle:"Instinct de survie"},
  {id:3,titre:"Grand-père raciste sur FB",enonce:"Lors d'un repas de famille, tu vois le reflet d'une page Facebook sur les lunettes de ton grand-père. Il est en train de publier des propos violemment racistes.",correction_partie1:"Clé : Trauma passé caché ou peur. Matrice C.\n→ Geste : Ne pas faire d'esclandre à table — l'isoler discrètement.\n→ Action : L'accompagner pour supprimer le post avant qu'il soit partagé.\n→ Relais : L'accompagner au commissariat s'il a été victime d'une agression.\n→ Extra-Mile : L'inviter dans un restaurant du pays concerné pour déconstruire les préjugés.",questions_jury:["Ton grand-père justifie ses propos en disant qu'il a le droit à la liberté d'expression.","Il te révèle qu'il a publié ça car il a été agressé la veille par deux personnes d'origine étrangère.","Les propos ont été vus par ton employeur qui te demande de t'expliquer sur le comportement de ta famille."],ripostes:["Le racisme n'est pas une opinion protégée mais un délit pénal (loi Pleven). Je lui rappelle la loi fermement, sans jugement moralisant.","Je suis bouleversé par son agression. Sa colère est légitime, mais sa méthode est illégale. On va porter plainte ensemble pour l'agression : c'est ainsi qu'on règle le problème à la source.","Je me désolidarise totalement de ces propos par neutralité axiologique. Je rappelle que je ne suis pas responsable légalement des actes d'un tiers, même familial."],matrice:"C",cle:"Trauma caché / Préjugés"},
  {id:4,titre:"Aidant Familial épuisé",enonce:"Ton meilleur ami, au volant de sa voiture, a les yeux rougis et commence à mordre la ligne blanche de l'autoroute.",correction_partie1:"Clé : Fardeau de l'aidant / Burn-out sévère. Matrice A/B.\n→ Geste : Hurler pour qu'il pile — urgence vitale absolue.\n→ Action : Stationnement d'urgence sur la bande d'arrêt.\n→ Relais : Assistante sociale du CCAS pour une infirmière à domicile.\n→ Extra-Mile : Taper ses fiches de révisions pour le soulager ce week-end.",questions_jury:["Il refuse de s'arrêter, te disant qu'il gère et qu'il faut absolument arriver à l'heure.","Il t'avoue qu'il prend des amphétamines illégales pour tenir le coup avec ses études et son parent malade.","Il te demande de lui prescrire un somnifère sur une ancienne ordonnance vierge que tu as trouvée."],ripostes:["Urgence vitale. Je hausse le ton — je simule une envie de vomir s'il le faut pour le forcer à s'arrêter sur la bande d'arrêt d'urgence. Je ne cède pas, la sécurité prime sur l'emploi du temps.","Je ne le juge pas, je comprends sa détresse. La drogue est pourtant destructrice. Je l'oriente vers un CSAPA (centre d'addictologie) et on cherche ensemble une aide humaine concrète pour son parent.","Refus catégorique — Illégal et dangereux. Je ne suis pas médecin diplômé. C'est un exercice illégal de la médecine. Je l'accompagne chez son médecin traitant dès demain matin."],matrice:"A/B",cle:"Burn-out aidant"},
  {id:5,titre:"Oncle Fake News Médicales",enonce:"Ton oncle, malade chronique, refuse son traitement. Il passe une vidéo TikTok en boucle à table expliquant qu'un hypnotiseur peut guérir sa maladie.",correction_partie1:"Clé : Déni de la maladie / Peur des effets secondaires. Matrice C.\n→ Geste : Aucune condescendance — pas de joute frontale (effet backfire).\n→ Action : Reprendre RDV avec le spécialiste pour réévaluer et ajuster le traitement.\n→ Relais : Son médecin traitant ou diabétologue/cardiologue.\n→ Extra-Mile : Lui offrir un livre de vulgarisation scientifique accessible.",questions_jury:["Il te dit que l'industrie pharmaceutique est un complot et que tu es endoctriné par tes études.","Il te demande de l'accompagner voir ce charlatan pour 'garder l'esprit ouvert'.","Son état se dégrade à table : il fait un malaise lié à l'arrêt de son traitement."],ripostes:["Je ne rentre pas dans une joute verbale — Maintien du dialogue. J'utilise la preuve par son propre ressenti corporel (avant/après traitement) pour semer le doute de façon non-violente.","Je refuse de cautionner le charlatanisme. J'explique la différence entre une addiction comportementale et une maladie organique incurable. Je reste ferme mais bienveillant.","Urgence vitale. J'appelle immédiatement le 15, j'applique les gestes de premiers secours (Matrice A). La sécurité prime sur toute discussion philosophique."],matrice:"C",cle:"Déni / Complotisme"},
  {id:6,titre:"Handicap Invisible (Tram)",enonce:"Dans un tramway bondé, un jeune homme à l'apparence athlétique est assis, transpirant. Une femme enceinte debout lui demande violemment la place.",correction_partie1:"Clé : Handicap invisible (ex. SEP) et terreur du jugement public. Matrice C.\n→ Geste : Dévier l'agressivité avec humour ou en cédant ma propre place — pas de confrontation.\n→ Action : Rassurer le jeune homme discrètement après la scène.\n→ Relais : L'informer sur la procédure de carte priorité MDPH.\n→ Extra-Mile : S'asseoir à côté de lui en cas de malaise.",questions_jury:["La femme enceinte s'énerve contre toi et t'accuse de défendre un égoïste.","Le jeune homme fait une crise d'épilepsie suite au stress de l'altercation.","Le jeune homme t'avoue qu'il a menti et n'a aucun handicap, il avait juste la flemme."],ripostes:["Je garde mon sang-froid. Je lui cède ma propre place pour désamorcer le conflit et lui rappelle calmement que tous les handicaps ne sont pas visibles — c'est un rappel éducatif, pas une attaque.","Urgence médicale — Matrice A. Je le mets en PLS dès la fin des convulsions, je sécurise l'espace autour de lui, j'appelle le 15.","Je suis indigné. Je lui demande fermement et calmement de laisser sa place à la femme enceinte, en rappelant le civisme de base."],matrice:"C",cle:"Handicap invisible"},
  {id:7,titre:"Harcèlement de rue",enonce:"Tu marches rue d'Alsace-Lorraine. Une jeune femme presse le pas, suivie de près par un individu insistant qui lui bloque le passage.",correction_partie1:"Clé : Urgence sécuritaire / Emprise dans l'espace public. Matrice E.\n→ Geste : Interposition pacifique en feignant de la connaître ('Salut cousine !').\n→ Action : L'extraire vers un lieu public sécurisé (commerce ouvert).\n→ Relais : Appel Police (17) si l'individu persiste.\n→ Extra-Mile : La raccompagner ou lui payer un Uber.",questions_jury:["L'individu sort un couteau et te menace de t'en mêler.","La jeune femme te repousse et te dit qu'elle n'a pas besoin de ton aide.","L'individu te dit qu'il est son petit ami et qu'ils ont juste une dispute de couple."],ripostes:["Fuite immédiate — Matrice E. Ma sécurité et celle d'autrui prime. Je cours avec elle vers un endroit bondé et j'appelle le 17 immédiatement depuis un lieu sécurisé.","Je respecte son refus — principe du Consentement. Je reste à une distance de sécurité discrète pour m'assurer qu'elle rentre bien, sans m'imposer.","Le statut de couple n'excuse pas la violence ni l'intimidation dans l'espace public. Je m'adresse uniquement à elle pour vérifier si elle se sent en sécurité : 'Tout va bien ?'"],matrice:"E",cle:"Urgence sécuritaire"},
  {id:8,titre:"Triche par désespoir",enonce:"En plein partiel, ton voisin de table, très stressé ces derniers temps, glisse une antisèche depuis sa manche.",correction_partie1:"Clé : Pression de la réussite / Syndrome de l'imposteur. Matrice C.\n→ Geste : Coup de coude discret pour le dissuader sans faire d'esclandre public.\n→ Action : Lui parler à la fin de l'épreuve avec bienveillance.\n→ Relais : Aide psychologique étudiante (SIMPPS).\n→ Extra-Mile : Organiser des nuits de révisions collectives.",questions_jury:["Le surveillant a un doute et te demande si tu as vu ton voisin tricher.","Ton ami te propose 500 euros pour que tu fasses le prochain devoir à sa place.","Il fait un malaise vagal en plein milieu de l'examen à cause du stress."],ripostes:["Je ne couvre pas la triche, mais je ne suis pas procureur. Je réponds que je suis concentré sur ma propre copie et que la surveillance est la responsabilité du surveillant.","Refus catégorique — Disque Rayé. C'est contraire à mon éthique et c'est une fraude académique avec des conséquences graves. Je lui propose une aide gratuite pour réviser.","J'alerte immédiatement les surveillants, je demande l'espace autour de lui, et je m'assure qu'on appelle les secours — Matrice A."],matrice:"C",cle:"Pression réussite"},
  {id:9,titre:"Emprise Conjugale",enonce:"Une amie arrive en plein été avec un col roulé ajusté. Elle sursaute quand on s'approche d'elle et regarde sans cesse son téléphone.",correction_partie1:"Clé : Violences physiques cachées / Emprise psychologique. Matrice A.\n→ Geste : Ne pas la forcer à parler devant tout le monde — l'emmener à la cuisine.\n→ Action : Écoute active et sans jugement — rythme à son niveau.\n→ Relais : Numéro national 3919 (Violences Femmes).\n→ Extra-Mile : L'héberger en urgence chez moi si elle le souhaite.",questions_jury:["Elle t'avoue qu'il la bat, mais refuse de porter plainte par peur qu'il la tue si elle le fait.","Le conjoint toxique sonne à ta porte en hurlant pour la récupérer.","Elle te demande de lui procurer des somnifères forts pour 'le droguer' et pouvoir fuir."],ripostes:["Je respecte absolument son rythme — je ne la brusque pas pour la plainte. Ma priorité est de la mettre physiquement en sécurité d'abord (hébergement secret ou foyer via assistante sociale).","Urgence sécuritaire. Je ne lui ouvre pas, je verrouille tout, et j'appelle immédiatement le 17 en signalant une menace physique imminente à mon domicile.","C'est illégal et extrêmement dangereux (risque d'homicide involontaire). Refus ferme. La seule fuite viable se fait avec l'aide coordonnée des forces de l'ordre et d'associations spécialisées."],matrice:"A",cle:"Violences cachées / Emprise"},
  {id:10,titre:"Dérive Sectaire amicale",enonce:"Un ami s'isole de plus en plus, te tient des discours sur la 'vérité du monde' et refuse de se soigner avec la médecine classique.",correction_partie1:"Clé : Dépression masquée exploitée par un groupe sectaire. Matrice C.\n→ Geste : Ne pas attaquer ses croyances de front — effet backfire garanti.\n→ Action : Maintenir le lien affectif en l'invitant régulièrement à manger.\n→ Relais : Signalement à la MIVILUDES.\n→ Extra-Mile : Contacter subtilement sa famille pour coordonner la vigilance.",questions_jury:["Il te demande un don financier important pour financer les activités de son 'maître spirituel'.","Il refuse d'aller à l'hôpital alors qu'il a une appendicite aiguë, son corps se 'purifie'.","Il te harcèle jour et nuit pour que tu rejoignes le groupe."],ripostes:["Je refuse catégoriquement tout financement. Je préserve mon intégrité et j'utilise ce signal d'alarme financier pour contacter immédiatement la MIVILUDES.","Urgence chirurgicale vitale. Si son pronostic vital est engagé et qu'il perd sa lucidité, j'appelle le 15 — quitte à briser la relation pour lui sauver la vie.","Je pose des limites claires et infranchissables pour préserver ma santé mentale. Si le harcèlement persiste malgré tout, je coupe temporairement le contact."],matrice:"C",cle:"Emprise sectaire"},
  {id:11,titre:"Sœur baby-sitter ivre",enonce:"Ta sœur rentre titubante à 20h30 pour prendre son service de baby-sitting. L'odeur d'alcool masque son parfum.",correction_partie1:"Clé : Peur de décevoir l'employeur / Sous-estimation de son état. Matrice A.\n→ Geste : La mettre au lit avec de l'eau — impérative et immédiate.\n→ Action : Sécurité des enfants ABSOLUE — lui interdire de partir, physiquement si nécessaire.\n→ Relais : Appeler les parents des enfants et me proposer comme remplaçant au pied levé.",questions_jury:["Ta sœur devient violente et veut absolument y aller pour ne pas perdre son job.","Les parents des enfants te demandent pourquoi elle n'est pas venue. Tu dis la vérité ?","Elle t'avoue qu'elle boit tous les jours pour gérer le stress de ses études."],ripostes:["Je lui confisque physiquement les clés. La sécurité des enfants prime sur sa fierté ou sa colère. C'est non négociable.","Je reste diplomate mais honnête : je dis qu'elle a eu un problème de santé soudain l'empêchant d'être pleinement lucide. Je n'entre pas dans les détails et j'assure moi-même le remplacement.","L'ivresse quotidienne cache une vraie détresse. Je l'oriente dès le lendemain matin vers la médecine universitaire ou un addictologue. Je lui offre mon soutien total, sans jugement."],matrice:"A",cle:"Sécurité enfants / Addictologie"},
  {id:12,titre:"Voisin Malaise Cardiaque",enonce:"Tu entends un cri strident chez le voisin, suivi des pleurs ininterrompus d'un enfant de 8 ans.",correction_partie1:"Clé : Urgence médicale pure. Matrice A.\n→ Geste : Frapper fort, chercher un voisin ayant un double des clés.\n→ Action : Bilan ABC dès l'entrée (Airway, Breathing, Circulation).\n→ Relais : Appel 15 (SAMU) — haut-parleur pour mains libres.\n→ Extra-Mile : Mettre l'enfant dans ma chambre avec des dessins animés pour le protéger du trauma.",questions_jury:["Tu rentres : le voisin est en arrêt cardiaque et l'enfant hurle de panique à côté.","Le SAMU tarde à arriver et tu es seul avec l'enfant et le voisin inconscient.","La famille du voisin t'accuse d'avoir fracturé la porte 'pour rien'."],ripostes:["J'isole immédiatement l'enfant dans une autre pièce pour préserver son intégrité psychologique. J'appelle le 15 (haut-parleur) et je commence le massage cardiaque sans attendre.","Je garde mon calme total. Je continue les gestes de secours sous la supervision du médecin régulateur du 15 au téléphone, tout en rassurant l'enfant à voix haute depuis la pièce adjacente.","La notion de 'Non-assistance à personne en danger' (Art. 223-6 CP) prévaut. J'ai agi de bonne foi face à des signes de détresse évidents. Je reste droit dans mes bottes."],matrice:"A",cle:"Urgence médicale pure"},
  {id:13,titre:"Falsification restaurant",enonce:"Tu es serveur l'été. Tu vois ton patron changer l'étiquette de péremption sur un grand lot de viande.",correction_partie1:"Clé : Pression financière / Faillite imminente du patron. Matrice D.\n→ Geste : Ne pas faire d'esclandre devant les clients — le retirer à l'écart.\n→ Action : Confrontation en privé et refus absolu de servir ce produit.\n→ Relais : Signalement à l'inspection hygiène (DDPP) en cas de refus de sa part.\n→ Extra-Mile : Jeter le produit moi-même ou démissionner sur-le-champ s'il force.",questions_jury:["Le patron te menace de te virer sans te payer si tu ne sers pas la viande.","Un client fait une grave intoxication alimentaire avec de la viande que tu as finalement servie.","Le patron t'avoue qu'il est ruiné et que jeter cette viande le mettra à la rue avec ses enfants."],ripostes:["Je ne cède pas au chantage. Servir un produit avarié est un délit criminel. Je quitte mon poste sur-le-champ et signale la fraude à la DDPP.","Je n'aurais pas dû la servir. Si tel est le cas, j'assume ma responsabilité, j'alerte immédiatement les urgences et je témoigne de la vérité intégrale lors de l'enquête sanitaire.","Je ressens de l'empathie pour sa détresse financière, mais la sécurité des clients est une ligne rouge absolue et infranchissable. On trouve une solution légale, pas de compromis sur la santé publique."],matrice:"D",cle:"Éthique / Pression hiérarchique"},
  {id:14,titre:"Colocataire en détresse",enonce:"En cherchant un chargeur dans la chambre de ta colocataire, tu tombes sur son journal intime ouvert : elle y décrit un état de détresse intense et des pensées sombres pour ce soir.",correction_partie1:"Clé : Risque vital imminent à évaluer. Matrice A.\n→ Geste : Ne pas ignorer — aborder le sujet de front avec une bienveillance totale dès son retour.\n→ Action : Écoute active, lui poser directement la question sur ses pensées.\n→ Relais : Appeler le 3114 (numéro national prévention du suicide) ensemble.\n→ Extra-Mile : Rester avec elle toute la nuit, mettre à l'écart tout ce qui pourrait être dangereux.",questions_jury:["Elle rentre, te voit avec le carnet et s'enferme à clé dans la salle de bain en pleurant.","Elle te supplie de ne rien dire à ses parents, promettant que tout va bien.","Elle refuse toute aide médicale et devient agressive envers toi."],ripostes:["Urgence vitale. Si pas de réponse et passage à l'acte imminent suspecté, j'appelle les pompiers (18) immédiatement — ils peuvent ouvrir la porte.","Je l'écoute avec respect. Face au risque vital, la priorité amicale saute. J'alerte les professionnels du 3114 et, si nécessaire, ses parents pour la protéger.","Je me protège physiquement, mais je ne l'abandonne pas. L'agressivité est un symptôme de détresse profonde. J'appelle les urgences psychiatriques pour une prise en charge adaptée."],matrice:"A",cle:"Détresse et risque vital"},
  {id:15,titre:"Précarité extrême & demande impossible",enonce:"Une amie en grande difficulté financière t'avoue qu'elle vend des services sexuels pour payer son loyer. Elle te demande de lui présenter un ami riche.",correction_partie1:"Clé : Précarité et instinct de survie — pas de jugement moral. Matrice B/D.\n→ Geste : Ne pas la juger, l'emmener dans un lieu sécurisant et calme.\n→ Action : Refus de jouer les entremetteurs — expliquer pourquoi clairement.\n→ Relais : AS du CROUS, associations spécialisées d'aide aux personnes en précarité.\n→ Extra-Mile : L'aider à refaire son CV et trouver un emploi alimentaire.",questions_jury:["Elle te demande de lui prêter ton appartement pour l'après-midi pour des raisons de sécurité.","Elle te dit qu'après tout, ton ami est adulte et cherche quelqu'un, pourquoi refuser de les présenter ?","Deux semaines plus tard, elle t'annonce qu'elle a arrêté mais qu'elle ne peut pas payer son loyer."],ripostes:["Refus inébranlable — Disque Rayé. Accepter ferait de moi un complice au regard de la loi et mettrait ma sécurité en jeu. Je l'héberge chez moi si elle le souhaite, dans un cadre sécurisé.","Je ne manipule pas mes amis. Je peux les présenter dans un cadre totalement neutre et honnête, mais je refuse d'être le vecteur d'une relation basée sur l'exploitation financière.","C'est la bonne nouvelle. Je l'aide maintenant activement : dossier APL d'urgence, démarches CROUS, avance sur loyer si je peux, et présence humaine totale."],matrice:"B/D",cle:"Précarité / Éthique"},
  {id:16,titre:"Parents divorcés Chantage",enonce:"Tes parents divorcés se disputent violemment. Ta mère déchire une photo de famille et ton père exige que tu choisisses ton camp.",correction_partie1:"Clé : Conflit de couple projeté sur les enfants / Malentendu. Matrice C.\n→ Geste : Recul physique, ne pas crier pour ne pas amplifier.\n→ Action : Assertivité — refus absolu et calme de prendre parti.\n→ Relais : Proposer un médiateur familial sur terrain neutre.\n→ Extra-Mile : Devenir le 'taxi' neutre et logistique de la famille.",questions_jury:["Ton père menace de couper le financement de tes études si tu continues de voir ta mère.","Ta mère fait une crise de nerfs et menace d'avaler des cachets si tu pars chez ton père.","Ton petit frère de 10 ans fugue à cause de l'ambiance."],ripostes:["Je ne cède pas au chantage financier. Je lui explique calmement que mes études ne sont pas une arme de négociation conjugale. Je maintiens ma neutralité fermement.","Urgence vitale — chantage à l'automutilation. Je ne pars pas, je la sécurise et j'appelle immédiatement le 15. La santé prime sur tout le reste.","J'arrête immédiatement toute dispute. J'appelle la police (17) pour signaler la disparition d'un mineur et j'organise les recherches avec mes deux parents — unis dans cette urgence."],matrice:"C",cle:"Conflit familial / Chantage"},
  {id:17,titre:"Éthique Stage Infirmier",enonce:"En stage infirmier, tu vois une IDE diplômée oublier volontairement de désinfecter une plaie pour aller plus vite en fin de service.",correction_partie1:"Clé : Pression hospitalière / Burn-out du personnel soignant. Matrice D.\n→ Geste : Ne pas l'humilier devant le patient — la prendre à part.\n→ Action : Lui faire la remarque en privé avec diplomatie, puis nettoyer la plaie moi-même.\n→ Relais : Alerter la cadre de santé si elle m'en empêche ou si cela se répète.\n→ Extra-Mile : Proposer de l'aider à finir ses tâches pour qu'elle ne soit plus sous pression.",questions_jury:["L'IDE te recadre violemment et te dit que tu n'es qu'un stagiaire sans expérience.","Le patient s'infecte lourdement quelques jours plus tard. La cadre te convoque.","L'IDE te demande de signer le protocole de soin à sa place pour gagner du temps."],ripostes:["Je garde mon calme, je nettoie la plaie pour protéger le patient — Primum Non Nocere. Si elle m'en empêche physiquement, j'alerte immédiatement la cadre de santé.","Je dis la stricte vérité, sans animosité mais avec précision factuelle. Le secret de stage ne couvre pas les fautes professionnelles mettant en danger la vie d'autrui.","Refus catégorique. C'est un faux en écriture médicale — délit pénal. Je trace uniquement les soins que j'ai personnellement réalisés ou directement observés."],matrice:"D",cle:"Éthique professionnelle"},
  {id:18,titre:"Enfant Maltraité (Baby-sit)",enonce:"Le petit garçon de 8 ans que tu gardes porte un pull en août. Quand tu lèves la main pour attraper un jouet, il sursaute de terreur.",correction_partie1:"Clé : Maltraitance intrafamiliale ou racket scolaire. Matrice A.\n→ Geste : S'asseoir au sol (safe space), baisser le ton de la voix.\n→ Action : Tenter de le faire parler par le jeu — ne pas le forcer ni nommer les choses.\n→ Relais : Signalement au 119 (Allô Enfance en Danger) en cas de suspicion.\n→ Extra-Mile : Rester vigilant lors du retour des parents et noter tous les éléments observés.",questions_jury:["L'enfant t'avoue que c'est son père qui le frappe avec une ceinture. Le père arrive dans 10 minutes.","L'enfant te supplie de ne rien dire car son père a menacé de faire du mal à sa petite sœur.","Le père arrive et remarque que tu as questionné son fils. Il devient menaçant envers toi."],ripostes:["Je ne le laisse pas seul. Je prétexte un oubli pour justifier ma présence prolongée. Si le danger est imminent à son retour, j'alerte la police (17) avant qu'il arrive.","Je l'écoute avec empathie totale. Mais la loi m'oblige à signaler — c'est une Information Préoccupante (119). Je lui promets que des adultes spécialisés vont les protéger, lui et sa sœur.","Je ne prends aucun risque physique. Je désamorce verbalement, quitte les lieux calmement et signale immédiatement les faits aux autorités depuis l'extérieur."],matrice:"A",cle:"Maltraitance enfant"},
  {id:19,titre:"Dérive Végétalienne Extrême",enonce:"Ta sœur impose un régime végétalien strict à son bébé de 8 mois. Le bébé est léthargique, apathique et très maigre.",correction_partie1:"Clé : Dogmatisme idéologique / Déni de la gravité médicale. Matrice A/C.\n→ Geste : Pas de jugement frontal sur le véganisme — effet backfire assuré.\n→ Action : Alerter d'urgence sur les symptômes spécifiques du bébé (léthargique = signe grave).\n→ Relais : Accompagnement urgent chez le pédiatre, sans négociation.\n→ Extra-Mile : Chercher des alternatives diététiques saines et validées avec elle.",questions_jury:["Ta sœur t'interdit de te mêler de l'éducation de son enfant et te met à la porte.","Le bébé fait une convulsion devant toi par carence sévère en vitamine B12.","Le pédiatre veut un signalement pour maltraitance nutritionnelle. Ta sœur te demande de mentir pour elle."],ripostes:["La santé d'un nourrisson prime sur toute relation familiale. Je contacte la PMI (Protection Maternelle et Infantile) ou le 119 pour signaler un enfant en danger immédiat.","Urgence vitale absolue — Matrice A. Je mets le bébé en sécurité, j'appelle le 15 immédiatement et je reste au téléphone avec le régulateur pour les gestes de secours.","Refus absolu. La protection du mineur est prioritaire sur toute loyauté familiale. Je refuse de mentir au pédiatre et je soutiens la procédure médicale pour la survie du bébé."],matrice:"A/C",cle:"Dogmatisme / Enfant en danger"},
  {id:20,titre:"Propos Racistes au Travail",enonce:"Tu es guichetier. Un client excédé hurle des injures racistes sur ton collègue d'origine étrangère.",correction_partie1:"Clé : Transfert émotionnel toxique / Variabilité socioculturelle. Matrice C/E.\n→ Geste : Interposition corporelle pacifique — bouclier visuel.\n→ Action : Refus de servir le client dans ces conditions, exprimé calmement.\n→ Relais : Appel de la sécurité interne + dépôt de plainte collectif.\n→ Extra-Mile : Payer un café à mon collègue pour le soutien psychologique immédiat.",questions_jury:["Le client s'en prend physiquement à toi avec agressivité.","Ton collègue, humilié, te demande de laisser tomber et de ne rien signaler.","Ton manager te reproche d'avoir fait perdre un client important à l'entreprise."],ripostes:["Je recule immédiatement — je ne réplique pas par la violence. J'appelle la sécurité ou le 17. Ma sécurité physique prime sur tout le reste.","Je respecte son refus de porter plainte lui-même. Mais je rédige une main courante ou un signalement interne en mon propre nom. Le racisme au travail est intolérable et doit être tracé.","L'éthique et le Code du travail priment sur le chiffre d'affaires. Je lui rappelle que la loi oblige l'employeur à protéger ses salariés contre les discriminations et les violences."],matrice:"C/E",cle:"Racisme / Solidarité"}
];

══════════════════════════════════════════════════════ */
function useLS(key,init){
  const[v,setV]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch{return init;}});
  const set=useCallback(fn=>{setV(prev=>{const next=typeof fn==='function'?fn(prev):fn;try{localStorage.setItem(key,JSON.stringify(next));}catch{}return next;});},[key]);
  return[v,set];
}

function MBadge({m}){const c=getM(m);return <span className="mbadge" style={{background:c.bg,color:c.tc}}>{m}</span>;}

function TimerRing({secs,total,size=160}){
  const sw=5,r=(size-sw*2)/2,circ=2*Math.PI*r;
  const pct=total>0?secs/total:0,off=circ*(1-pct);
  const mins=Math.floor(secs/60),s=secs%60;
  const t=`${mins}:${s.toString().padStart(2,'0')}`;
  const urgent=secs<=60&&secs>0,col=secs===0?'#9CA3AF':urgent?'#DC2626':'#1B3A5C';
  return(
    <div style={{width:size,height:size,position:'relative',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)',position:'absolute'}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E5E0D5" strokeWidth={sw}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={col} strokeWidth={sw} strokeLinecap="round"
          strokeDasharray={circ} strokeDashoffset={off} style={{transition:'stroke-dashoffset 1s linear,stroke .3s ease'}}/>
      </svg>
      <div className={urgent?'urgent':''} style={{textAlign:'center'}}>
        <div style={{fontFamily:'DM Sans',fontSize:size*.21,fontWeight:300,color:col,lineHeight:1}}>{t}</div>
        <div style={{fontSize:10,color:'#8A8070',marginTop:3}}>restantes</div>
      </div>
    </div>
  );
}

function RadarChart({v,size=220}){
  const cx=size/2,mx=size/2-38;
  const gp=(i,r)=>{const a=(i*2*Math.PI/3)-Math.PI/2;return{x:cx+mx*r*Math.cos(a),y:cx+mx*r*Math.sin(a)};};
  const labs=['Empathie','Assertivité','Éthique'];
  const vals=[v.empathie/5,v.assertivite/5,v.ethique/5];
  const dp=vals.map((r,i)=>gp(i,Math.max(r||0,.04)));
  const poly=dp.map(p=>`${p.x},${p.y}`).join(' ');
  const grids=[.25,.5,.75,1].map(l=>[0,1,2].map(i=>{const p=gp(i,l);return`${p.x},${p.y}`;}).join(' '));
  return(
    <svg width={size} height={size}>
      {grids.map((pts,i)=><polygon key={i} points={pts} fill="none" stroke="#E5E0D5" strokeWidth="1"/>)}
      {[0,1,2].map(i=>{const p=gp(i,1);return<line key={i} x1={cx} y1={cx} x2={p.x} y2={p.y} stroke="#E5E0D5" strokeWidth="1"/>;})}
      <polygon points={poly} fill="rgba(27,58,92,.13)" stroke="#1B3A5C" strokeWidth="2.5" strokeLinejoin="round"/>
      {dp.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="4.5" fill="#1B3A5C"/>)}
      {labs.map((l,i)=>{const a=(i*2*Math.PI/3)-Math.PI/2,lx=cx+(mx+26)*Math.cos(a),ly=cx+(mx+26)*Math.sin(a);
        return<text key={i} x={lx} y={ly} textAnchor="middle" dominantBaseline="central" fontSize="12" fill="#1C1C1E" fontFamily="DM Sans" fontWeight="500">{l}</text>;})}
    </svg>
  );
}

function GaugeRing({value,color='#1B3A5C',label,size=76}){
  const sw=5,r=(size-sw*2)/2,circ=2*Math.PI*r,off=circ*(1-(value||0)/5);
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
      <div style={{width:size,height:size,position:'relative',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <svg width={size} height={size} style={{transform:'rotate(-90deg)',position:'absolute'}}>
