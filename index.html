<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #F4F1EB;
  color: #1B2A4A;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #C9A84C55; border-radius: 4px; }

/* Highlight effect */
.hl {
  background: linear-gradient(105deg, #FAEDB5 0%, #F7E490 100%);
  padding: 1px 6px;
  border-radius: 3px;
}

/* Cards */
.card {
  background: #fff;
  border-radius: 18px;
  box-shadow: 0 1px 3px rgba(27,42,74,.06), 0 4px 16px rgba(27,42,74,.05);
  transition: box-shadow .25s ease, transform .15s ease;
}
.card-hover:hover {
  box-shadow: 0 4px 24px rgba(27,42,74,.12);
}

/* Animations */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes slideRight {
  from { opacity:0; transform:translateX(-14px); }
  to   { opacity:1; transform:translateX(0); }
}
@keyframes popIn {
  0%   { opacity:0; transform:scale(.85) translateY(8px); }
  65%  { transform:scale(1.04) translateY(-2px); }
  100% { opacity:1; transform:scale(1) translateY(0); }
}
@keyframes pulse {
  0%,100% { opacity:1; }
  50%      { opacity:.6; }
}
@keyframes ring-fill {
  from { stroke-dashoffset: var(--dash-full); }
  to   { stroke-dashoffset: var(--dash-target); }
}

.anim-up   { animation: fadeUp   .45s ease both; }
.anim-side { animation: slideRight .4s ease both; }
.anim-pop  { animation: popIn    .4s ease both; }
.anim-pulse{ animation: pulse 2s ease infinite; }

/* Accordion */
.acc-body {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows .38s ease;
}
.acc-body.open { grid-template-rows: 1fr; }
.acc-inner { overflow: hidden; }

/* Timer ring */
.timer-ring {
  transition: stroke-dashoffset 1s linear, stroke .6s ease;
  transform: rotate(-90deg);
  transform-origin: 70px 70px;
}

/* Checklist */
.check-row {
  display: flex; align-items: flex-start; gap: 10px;
  cursor: pointer; padding: 6px 0;
  border-bottom: 1px solid #F3F4F6;
  transition: opacity .2s;
}
.check-row:last-child { border-bottom: none; }
.check-row.checked { opacity: .55; }
.check-row.checked .check-label { text-decoration: line-through; }
.check-box {
  flex-shrink: 0;
  margin-top: 2px;
  width: 20px; height: 20px;
  border-radius: 6px;
  border: 2px solid #D1D5DB;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s ease;
}
.check-box.on {
  border-color: #5C7A62;
  background: #5C7A62;
}

/* Tag pills */
.tag {
  font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 20px;
  background: #F3F4F6; color: #6B7280;
  white-space: nowrap;
}
.tag.Urgence   { background:#FEE2E2; color:#B91C1C; }
.tag.Social    { background:#D1FAE5; color:#065F46; }
.tag.Relationnel { background:#DBEAFE; color:#1E40AF; }
.tag.Ethique   { background:#FEF3C7; color:#92400E; }
.tag.Sante     { background:#EDE9FE; color:#5B21B6; }
.tag.Medical   { background:#CFFAFE; color:#155E75; }
.tag.Familial  { background:#FCE7F3; color:#9D174D; }

/* Nav */
.nav-btn { position: relative; transition: opacity .2s; }
.nav-btn.active::after {
  content:'';
  position: absolute;
  bottom: -1px; left: 50%;
  transform: translateX(-50%);
  width: 24px; height: 3px;
  border-radius: 2px;
  background: #1B2A4A;
}

/* Toggle */
.toggle-track {
  width: 46px; height: 26px; border-radius: 13px;
  background: #D1D5DB;
  position: relative; cursor: pointer;
  transition: background .25s ease;
}
.toggle-track.on { background: #1B2A4A; }
.toggle-thumb {
  position: absolute;
  top: 3px; left: 3px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: white;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
  transition: transform .25s ease;
}
.toggle-track.on .toggle-thumb { transform: translateX(20px); }

/* Mastery select */
.mastery-select {
  border: none; outline: none;
  border-radius: 8px;
  font-size: 11px; font-weight: 600;
  padding: 4px 6px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}

/* Jury popup */
.jury-toast {
  position: fixed;
  top: 20px; left: 50%;
  transform: translateX(-50%);
  z-index: 999;
  animation: popIn .4s ease both;
}

/* Button base */
.btn {
  display: block; width: 100%;
  padding: 14px 20px;
  border-radius: 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 600;
  text-align: center;

.btn-navy  { background: #1B2A4A; color: #fff; }
.btn-sage  { background: #5C7A62; color: #fff; }
.btn-ghost { background: #fff; color: #1B2A4A; box-shadow: 0 1px 3px rgba(27,42,74,.1); }
</style>
</head>

function InteractiveDropdown({ label, options }) {
  const [open, setOpen] = useState(false);
  return (
    <span style={{position:'relative', display:'inline-block'}}>
      <button 
        onClick={(e) => { e.stopPropagation(); setOpen(!open); }} 
        style={{background:'#1B2A4A', color:'#fff', padding:'3px 8px', borderRadius:6, margin:'0 4px', fontSize:12, fontWeight:700, border:'none', cursor:'pointer', fontFamily:'DM Sans', verticalAlign:'middle', boxShadow:'0 2px 4px rgba(27,42,74,0.2)'}}>
        {label} ▾
      </button>
      {open && (
        <span style={{position:'absolute', top:'120%', left:0, background:'#fff', border:'1px solid #E5E7EB', borderRadius:8, padding:'10px', minWidth:320, zIndex:50, boxShadow:'0 10px 25px rgba(0,0,0,0.15)', display:'flex', flexDirection:'column', gap:6, textAlign:'left'}}>
          <div style={{fontSize:10, color:'#9CA3AF', fontWeight:800, textTransform:'uppercase'}}>Options à adapter :</div>
          {options.map((opt, i) => (
            <div key={i} style={{fontSize:12, color:'#1B2A4A', padding:'8px', background:'#F9FAFB', borderRadius:6, lineHeight:1.4, fontWeight:500, border:'1px solid #F3F4F6'}}>
              {opt}
            </div>
          ))}
        </span>
      )}
    </span>
  );
}

function InteractiveText({ parts }) {
  return (
    <div className="hl" style={{borderRadius:10, padding:'16px 20px', lineHeight: 2, fontSize: 14, color:'#1B2A4A', background: '#FAEDB5', marginBottom:12}}>
      <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em',color:'#92400E',marginBottom:10}}>⭐ Phrase d'ancrage interactive</div>
      <div style={{fontStyle:'italic', fontWeight:500}}>
        {parts.map((p, i) => {
          if (p.text) return <span key={i}>{p.text}</span>;
          if (p.var) return <InteractiveDropdown key={i} label={p.var} options={p.options} />;
          return null;
        })}
      </div>
    </div>
  )
}

function useLS(key, def) {
  const [v, setV] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : def; }
    catch { return def; }
  });
  const set = useCallback(upd => {
    setV(prev => {
      const next = typeof upd === 'function' ? upd(prev) : upd;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  }, [key]);
  return [v, set];
}

function CircularTimer({ total, remaining, running }) {
  const R = 54, C = 2 * Math.PI * R;
  const pct = remaining / total;
  const offset = C * (1 - pct);
  const m = Math.floor(remaining / 60);
  const s = remaining % 60;
  const low = remaining < 60;
  const mid = remaining < 180;
  const strokeColor = low ? '#A83232' : mid ? '#C9A84C' : '#1B2A4A';

  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
      <svg width="140" height="140" viewBox="0 0 140 140">
        <circle cx="70" cy="70" r={R} fill="none" stroke="#F0EDE7" strokeWidth="9"/>
        <circle
          cx="70" cy="70" r={R}
          fill="none" stroke={strokeColor} strokeWidth="9"
          strokeLinecap="round"
          strokeDasharray={C}
          strokeDashoffset={offset}
          className="timer-ring"
        />
        <text x="70" y="64" textAnchor="middle" fontSize="28" fontWeight="600"
          fill={strokeColor} fontFamily="DM Sans, sans-serif">
          {String(m).padStart(2,'0')}:{String(s).padStart(2,'0')}
        </text>
        <text x="70" y="82" textAnchor="middle" fontSize="10" fill="#9CA3AF" fontFamily="DM Sans, sans-serif"
          className={low ? 'anim-pulse' : ''}>
          {running ? (low ? 'TERMINEZ !' : 'EN COURS') : 'EN PAUSE'}
        </text>
      </svg>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   SCORE GAUGE
═══════════════════════════════════════════════════════ */

function Gauge({ score, label, color='#1B2A4A' }) {
  const R = 36, C = 2 * Math.PI * R;
  const offset = C * (1 - score / 100);
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
      <svg width="90" height="90" viewBox="0 0 90 90">
        <circle cx="45" cy="45" r={R} fill="none" stroke="#F0EDE7" strokeWidth="7"/>
        <circle cx="45" cy="45" r={R} fill="none" stroke={color} strokeWidth="7"
          strokeLinecap="round" strokeDasharray={C} strokeDashoffset={offset}
          style={{transform:'rotate(-90deg)',transformOrigin:'45px 45px',transition:'stroke-dashoffset 1.2s ease'}}/>
        <text x="45" y="50" textAnchor="middle" fontSize="18" fontWeight="600"
          fill={color} fontFamily="DM Sans, sans-serif">{score}%</text>
      </svg>
      <span style={{fontSize:11,color:'#6B7280',fontWeight:500,textAlign:'center',maxWidth:72}}>{label}</span>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════════════════ */

function Dashboard({ sessions, mastery }) {
  const n = sessions.length;
  const avg = n ? Math.round(sessions.reduce((a,s)=>a+s.score,0)/n) : 0;
  const masterCount = Object.values(mastery).filter(v=>v===3).length;
  const recent = [...sessions].reverse().slice(0,6);

  const tagMap = {};
  sessions.forEach(s => {
    const sc = SCENARIOS.find(x=>x.id===s.scenarioId);
    if (!sc) return;
    sc.tags.forEach(t => {
      tagMap[t] = tagMap[t] || {sum:0,n:0};
      tagMap[t].sum += s.score;
      tagMap[t].n++;
    });
  });
  const cats = [
    {label:'Urgence',   color:'#A83232'},
    {label:'Social',    color:'#5C7A62'},
    {label:'Relationnel',color:'#1B2A4A'},
    {label:'Éthique',   color:'#C9A84C'},
    {label:'Santé',     color:'#7C3AED'},
    {label:'Sécurité',  color:'#0891B2'},
  ].map(c => ({...c, score: tagMap[c.label] ? Math.round(tagMap[c.label].sum/tagMap[c.label].n) : 0}))
   .filter(c=>c.score>0);

  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}} className="anim-up">

      {/* Stats row */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
        {[
          {val:n, label:'Simulations', color:'#1B2A4A'},
          {val:avg+'%', label:'Score moyen', color:'#5C7A62'},
          {val:masterCount, label:'Maîtrisés', color:'#C9A84C'},
        ].map((s,i)=>(
          <div key={i} className="card" style={{padding:'16px 12px',textAlign:'center'}}>
            <div style={{fontSize:30,fontWeight:700,fontFamily:'Playfair Display, serif',color:s.color,lineHeight:1.1}}>{s.val}</div>
            <div style={{fontSize:11,color:'#9CA3AF',fontWeight:500,marginTop:4,textTransform:'uppercase',letterSpacing:'0.06em'}}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Category gauges */}
      <div className="card" style={{padding:'20px 16px'}}>
        <div style={{fontFamily:'Playfair Display, serif',fontWeight:700,fontSize:16,color:'#1B2A4A',marginBottom:16}}>
          Compétences par catégorie
        </div>
        {cats.length === 0 ? (
          <div style={{textAlign:'center',padding:'24px 0',color:'#9CA3AF'}}>
            <div style={{fontSize:36,marginBottom:8}}>🎯</div>
            <div style={{fontSize:13}}>Lance ta première simulation dans L'Arène pour voir tes stats ici.</div>
          </div>
        ) : (
          <div style={{display:'flex',flexWrap:'wrap',gap:16,justifyContent:'center'}}>
            {cats.map(c=><Gauge key={c.label} score={c.score} label={c.label} color={c.color}/>)}
          </div>
        )}
      </div>

      {/* Scenario mastery grid */}
      <div className="card" style={{padding:'20px 16px'}}>
        <div style={{fontFamily:'Playfair Display, serif',fontWeight:700,fontSize:16,color:'#1B2A4A',marginBottom:12}}>
          Carte de progression
        </div>
        <div style={{display:'flex',gap:12,flexWrap:'wrap',marginBottom:12}}>
          {Object.entries(MASTERY).map(([lvl,{color,label}])=>(
            <div key={lvl} style={{display:'flex',alignItems:'center',gap:6}}>
              <div style={{width:10,height:10,borderRadius:'50%',background:color}}/>
              <span style={{fontSize:11,color:'#6B7280'}}>{label}</span>
            </div>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8}}>
          {SCENARIOS.map(sc=>{
            const m = mastery[sc.id]||0;
            const {bg,color} = MASTERY[m];
            return (
              <div key={sc.id} style={{background:bg,borderRadius:10,padding:'8px 4px',textAlign:'center'}}>
                <div style={{fontSize:20}}>{sc.emoji}</div>
                <div style={{fontSize:10,fontWeight:700,color,marginTop:2}}>{sc.id}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Recent sessions */}
      {recent.length > 0 && (
        <div className="card" style={{padding:'20px 16px'}}>
          <div style={{fontFamily:'Playfair Display, serif',fontWeight:700,fontSize:16,color:'#1B2A4A',marginBottom:12}}>
            Dernières simulations
          </div>
          <div>
            {recent.map((s,i)=>{
              const sc = SCENARIOS.find(x=>x.id===s.scenarioId);
              const sColor = s.score>=70?'#059669':s.score>=40?'#D97706':'#EF4444';
              return (
                <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0',borderBottom:i<recent.length-1?'1px solid #F3F4F6':'none'}}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span style={{fontSize:22}}>{sc?.emoji||'📋'}</span>
                    <div>
                      <div style={{fontSize:13,fontWeight:500,color:'#1B2A4A'}}>{sc?.titre||'Scénario'}</div>
                      <div style={{fontSize:11,color:'#9CA3AF'}}>{new Date(s.date).toLocaleDateString('fr-FR')}</div>
                    </div>
                  </div>
                  <div style={{fontSize:16,fontWeight:700,color:sColor}}>{s.score}%</div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   ARENE
═══════════════════════════════════════════════════════ */

const TIMER_SEC = 5 * 60;

function Arene({ onDone }) {
  const [phase, setPhase] = useState('idle');
  const [sc, setSc] = useState(null);
  const [jury, setJury] = useState(false);
  const [running, setRunning] = useState(false);
  const [rem, setRem] = useState(TIMER_SEC);
  const [done, setDone] = useState(false);
  const [toast, setToast] = useState(null);
  const [chk1, setChk1] = useState(Array(CHECKLIST_P1.length).fill(false));
  const [chk2, setChk2] = useState(Array(CHECKLIST_P2.length).fill(false));
  const [activeQ, setActiveQ] = useState(0);

  const timerRef = useRef(null);
  const juryRef  = useRef(null);

  // Timer
  useEffect(()=>{
    if (running && rem > 0) {
      timerRef.current = setInterval(()=>{
        setRem(p=>{
          if(p<=1){ clearInterval(timerRef.current); setRunning(false); setDone(true); return 0; }
          return p-1;
        });
      },1000);
    }
    return ()=>clearInterval(timerRef.current);
  },[running]);

  // Jury sadique
  useEffect(()=>{
    if (!jury||!running) { clearTimeout(juryRef.current); return; }
    const scheduleNext = () => {
      juryRef.current = setTimeout(()=>{
        const msg = JURY_MSGS[Math.floor(Math.random()*JURY_MSGS.length)];
        setToast(msg);
        setTimeout(()=>setToast(null),3200);
        scheduleNext();
      }, 18000+Math.random()*35000);
    };
    scheduleNext();
    return ()=>clearTimeout(juryRef.current);
  },[jury,running]);

  const startSession = () => {
    const scenario = SCENARIOS[Math.floor(Math.random()*SCENARIOS.length)];
    setSc(scenario);
    setPhase('p1');
    setRem(TIMER_SEC); setDone(false);
    setRunning(true);
    setChk1(Array(CHECKLIST_P1.length).fill(false));
    setChk2(Array(CHECKLIST_P2.length).fill(false));
    setActiveQ(0);
    setToast(null);
  };

  const toCorr1 = () => {
    clearInterval(timerRef.current); clearTimeout(juryRef.current);
    setRunning(false); setToast(null); setPhase('correction1');
  };

  const toP2 = () => {
    setPhase('p2'); setRem(TIMER_SEC); setDone(false);
    setRunning(true); setActiveQ(0);
  };

  const toCorr2 = () => {
    clearInterval(timerRef.current); clearTimeout(juryRef.current);
    setRunning(false); setPhase('correction2');
  };

  const finish = () => {
    const c1 = chk1.filter(Boolean).length;
    const c2 = chk2.filter(Boolean).length;
    const score = Math.round((c1+c2)/(CHECKLIST_P1.length+CHECKLIST_P2.length)*100);
    setPhase('result');
    onDone({ scenarioId:sc.id, score, c1, c2, date:new Date().toISOString() });
  };

  const reset = () => {
    clearInterval(timerRef.current); clearTimeout(juryRef.current);
    setPhase('idle'); setSc(null); setRunning(false); setDone(false);
  };

  // ── IDLE ──
  if (phase==='idle') return (
    <div style={{display:'flex',flexDirection:'column',gap:16}} className="anim-up">
      <div className="card" style={{padding:'20px 16px'}}>
        <div style={{fontFamily:'Playfair Display, serif',fontWeight:700,fontSize:20,color:'#1B2A4A',marginBottom:6}}>L'Arène de Simulation</div>
        <p style={{fontSize:13,color:'#6B7280',lineHeight:1.6,marginBottom:20}}>Lance une simulation complète. Tu auras 5 minutes par partie pour t'exprimer à voix haute.</p>

        <div style={{background:'#FAEDB5',borderRadius:14,padding:'14px',display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
          <span style={{fontSize:24}}>⚔️</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600,color:'#1B2A4A'}}>Mode Jury Sadique</div>
            <div style={{fontSize:11,color:'#92400E',marginTop:2}}>Pop-ups psychologiques pendant le chrono</div>
          </div>
          <div className={`toggle-track ${jury?'on':''}`} onClick={()=>setJury(!jury)}>
            <div className="toggle-thumb"/>
          </div>
        </div>

        <button className="btn btn-navy" onClick={startSession}>🎯  Lancer un sujet aléatoire</button>
      </div>

      <div className="card" style={{padding:'16px',background:'#F8F6F1',border:'1px solid #E5E0D4'}}>
        <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em',color:'#9CA3AF',marginBottom:8}}>Rappel du déroulé</div>
        {[
          {emoji:'🎤',text:'Partie 1 — Monologue (5 min chrono)'},
          {emoji:'✅',text:'Auto-évaluation & Correction P1'},
          {emoji:'🎭',text:'Partie 2 — Questions jury (5 min chrono)'},
          {emoji:'🏁',text:'Auto-évaluation, Ripostes & Score final'},
        ].map((s,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'6px 0',borderBottom:i<3?'1px solid #EDE8DE':'none'}}>
            <span>{s.emoji}</span>
            <span style={{fontSize:12,color:'#4B5563'}}>{s.text}</span>
          </div>
        ))}
      </div>
    </div>
  );

  // ── PARTIE 1 ──
  if (phase==='p1') return (
    <div style={{display:'flex',flexDirection:'column',gap:14}} className="anim-up">
      {toast && (
        <div className="jury-toast">
          <div style={{background:'white',border:'1px solid #FECACA',borderRadius:20,padding:'10px 18px',boxShadow:'0 8px 24px rgba(0,0,0,.12)',display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:20}}>{toast.icon}</span>
            <span style={{fontSize:13,fontWeight:600,color:'#B91C1C'}}>{toast.text}</span>
          </div>
        </div>
      )}

      <div className="card" style={{padding:'14px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontSize:10,color:'#9CA3AF',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.07em'}}>Partie 1 · Monologue</div>
          <div style={{fontFamily:'Playfair Display, serif',fontWeight:700,fontSize:15,color:'#1B2A4A',marginTop:2}}>{sc.titre}</div>
        </div>
        <span style={{fontSize:30}}>{sc.emoji}</span>
      </div>

      <div className="card" style={{padding:'20px',display:'flex',justifyContent:'center'}}>
        <CircularTimer total={TIMER_SEC} remaining={rem} running={running}/>
      </div>

      <div className="card" style={{padding:'16px'}}>
        <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em',color:'#9CA3AF',marginBottom:8}}>📋 Énoncé</div>
        <p style={{fontSize:13,color:'#1B2A4A',lineHeight:1.65}}>{sc.enonce}</p>
      </div>

      {done && (
        <div style={{background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:14,padding:'12px 16px',textAlign:'center'}}>
          <span style={{fontSize:13,fontWeight:600,color:'#B91C1C'}}>⏰ Temps écoulé ! Passe à la correction.</span>
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <button className="btn btn-ghost" onClick={()=>setRunning(!running)}
          style={{color:running?'#A83232':'#5C7A62'}}>
          {running ? '⏸  Pause' : '▶️  Reprendre'}
        </button>
        <button className="btn btn-sage" onClick={toCorr1}>✅  Voir Correction</button>
      </div>
    </div>
  );

  // ── CORRECTION 1 ──
  if (phase==='correction1') return (
    <div style={{display:'flex',flexDirection:'column',gap:14}} className="anim-side">
      <div className="card" style={{padding:'14px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontSize:10,color:'#9CA3AF',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.07em'}}>Correction · Partie 1</div>
          <div style={{fontFamily:'Playfair Display, serif',fontWeight:700,fontSize:15,color:'#1B2A4A',marginTop:2}}>{sc.titre}</div>
        </div>
        <span style={{fontSize:30}}>{sc.emoji}</span>
      </div>

      <div className="card" style={{padding:'16px'}}>
        <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em',color:'#1B2A4A',marginBottom:8}}>💡 Hypothèse idéale</div>
        <div className="hl" style={{borderRadius:10,padding:'12px'}}>
          <p style={{fontSize:13,color:'#1B2A4A',fontWeight:500,lineHeight:1.6}}>{sc.hypothese}</p>
        </div>
      </div>

      <div className="card" style={{padding:'16px'}}>
        <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em',color:'#1B2A4A',marginBottom:10}}>📖 Correction complète</div>
        <p style={{fontSize:13,color:'#4B5563',lineHeight:1.7,whiteSpace:'pre-line'}}>{sc.correction_p1}</p>
      </div>

      <div className="card" style={{padding:'16px'}}>
        <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em',color:'#1B2A4A',marginBottom:10}}>✅ Auto-évaluation Partie 1</div>
        <Checklist items={CHECKLIST_P1} checked={chk1} onChange={setChk1}/>
      </div>

      <button className="btn btn-navy" onClick={toP2}>➡️  Passer à la Partie 2 — Questions Jury</button>
    </div>
  );

  // ── PARTIE 2 ──
  if (phase==='p2') return (
    <div style={{display:'flex',flexDirection:'column',gap:14}} className="anim-up">
      <div className="card" style={{padding:'14px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontSize:10,color:'#9CA3AF',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.07em'}}>Partie 2 · Questions Jury</div>
          <div style={{fontFamily:'Playfair Display, serif',fontWeight:700,fontSize:15,color:'#1B2A4A',marginTop:2}}>{sc.titre}</div>
        </div>
        <span style={{fontSize:30}}>{sc.emoji}</span>
      </div>

      <div className="card" style={{padding:'20px',display:'flex',justifyContent:'center'}}>
        <CircularTimer total={TIMER_SEC} remaining={rem} running={running}/>
      </div>

      <div className="card" style={{padding:'16px'}}>
        <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em',color:'#9CA3AF',marginBottom:12}}>🎤 Questions du Jury — réponds à voix haute</div>
        {sc.questions_jury.map((q,i)=>(
          <div key={i} onClick={()=>setActiveQ(i)}
            style={{padding:'12px 14px',borderRadius:12,marginBottom:8,cursor:'pointer',transition:'all .2s',
              borderLeft:`4px solid ${i===activeQ?'#1B2A4A':'#E5E7EB'}`,
              background:i===activeQ?'#EFF2F7':'#F9FAFB'}}>
            <div style={{fontSize:10,fontWeight:700,color:'#9CA3AF',marginBottom:4}}>Question {i+1}</div>
            <p style={{fontSize:13,color:'#1B2A4A',fontWeight:500,lineHeight:1.45}}>{q}</p>
          </div>
        ))}
      </div>

      {done && (
        <div style={{background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:14,padding:'12px 16px',textAlign:'center'}}>
          <span style={{fontSize:13,fontWeight:600,color:'#B91C1C'}}>⏰ Temps écoulé ! Passe à la correction.</span>
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <button className="btn btn-ghost" onClick={()=>setRunning(!running)}
          style={{color:running?'#A83232':'#5C7A62'}}>
          {running ? '⏸  Pause' : '▶️  Reprendre'}
        </button>
        <button className="btn btn-sage" onClick={toCorr2}>✅  Voir Correction P.2</button>
      </div>
    </div>
  );

    // ── CORRECTION 2 ──
  if (phase==='correction2') return (
    <div style={{display:'flex',flexDirection:'column',gap:14}} className="anim-side">
      <div className="card" style={{padding:'14px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontSize:10,color:'#9CA3AF',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.07em'}}>Correction · Partie 2</div>
          <div style={{fontFamily:'Playfair Display, serif',fontWeight:700,fontSize:15,color:'#1B2A4A',marginTop:2}}>{sc.titre}</div>
        </div>
        <span style={{fontSize:30}}>{sc.emoji}</span>
      </div>

      <div className="card" style={{padding:'16px'}}>
        <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em',color:'#1B2A4A',marginBottom:12}}>📖 Ripostes attendues</div>
        {sc.ripostes.map((r,i)=>(
          <div key={i} style={{marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:'#5C7A62',marginBottom:4}}>Pour la question {i+1} :</div>
            <p style={{fontSize:13,color:'#4B5563',lineHeight:1.6}}>{r}</p>
          </div>
        ))}
      </div>

      <div className="card" style={{padding:'16px'}}>
        <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em',color:'#1B2A4A',marginBottom:10}}>✅ Auto-évaluation Partie 2</div>
        <Checklist items={CHECKLIST_P2} checked={chk2} onChange={setChk2}/>
      </div>

      <button className="btn btn-navy" onClick={finish}>🏁  Terminer et enregistrer le score</button>
    </div>
  );

  // ── RESULT ──
  if (phase==='result') return (
    <div style={{display:'flex',flexDirection:'column',gap:16}} className="anim-pop">
      <div className="card" style={{padding:'30px 20px',textAlign:'center'}}>
        <div style={{fontSize:40,marginBottom:10}}>🎉</div>
        <div style={{fontFamily:'Playfair Display, serif',fontWeight:700,fontSize:22,color:'#1B2A4A',marginBottom:4}}>Simulation terminée</div>
        <p style={{fontSize:13,color:'#6B7280',marginBottom:20}}>Voici ton score d'auto-évaluation pour ce scénario.</p>
        
        <div style={{display:'flex',justifyContent:'center'}}>
          <Gauge score={Math.round((chk1.filter(Boolean).length + chk2.filter(Boolean).length) / (CHECKLIST_P1.length + CHECKLIST_P2.length) * 100)} label="Score final" color="#5C7A62" />
        </div>
      </div>

      <button className="btn btn-navy" onClick={reset}>🏠  Retour à l'Arène</button>
    </div>
  );

  return null;
}

/* ═══════════════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════════════ */

function App() {
  const [tab, setTab] = useState('dashboard');
  const [sessions, setSessions] = useState(() => {
    try { const s = localStorage.getItem('oral_sessions'); return s ? JSON.parse(s) : []; }
    catch { return []; }
  });
  const [mastery, setMastery] = useState(() => {
    try { const s = localStorage.getItem('oral_mastery'); return s ? JSON.parse(s) : {}; }
    catch { return {}; }
  });

  const handleDone = (result) => {
    const newSessions = [...sessions, result];
    setSessions(newSessions);
    localStorage.setItem('oral_sessions', JSON.stringify(newSessions));
  };

  const updateMastery = (id, lvl) => {
    const newMastery = {...mastery, [id]: lvl};
    setMastery(newMastery);
    localStorage.setItem('oral_mastery', JSON.stringify(newMastery));
  };

  return (
    <div style={{maxWidth:600,margin:'0 auto',paddingBottom:80}}>
      {/* Header */}
      <header style={{padding:'20px 16px',display:'flex',alignItems:'center',gap:12,background:'#fff',boxShadow:'0 1px 2px rgba(0,0,0,.04)',position:'sticky',top:0,zIndex:100}}>
        <div style={{width:36,height:36,borderRadius:10,background:'#1B2A4A',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>⚕️</div>
        <div>
          <h1 style={{fontFamily:'Playfair Display, serif',fontWeight:700,fontSize:18,color:'#1B2A4A'}}>OralMed 2026</h1>
          <div style={{fontSize:11,color:'#9CA3AF',fontWeight:500,letterSpacing:'0.04em'}}>ACADÉMIE DES ORAUX</div>
        </div>
      </header>

      {/* Main Content */}
      <main style={{padding:'16px'}}>
        {tab==='dashboard' && <Dashboard sessions={sessions} mastery={mastery}/>}
        {tab==='grimoire'  && <Grimoire/>}
        {tab==='repertoire'&& <Repertoire mastery={mastery} setMastery={updateMastery}/>}
        {tab==='arene'     && <Arene onDone={handleDone}/>}
      </main>

      {/* Bottom Nav */}
      <nav style={{position:'fixed',bottom:0,left:0,right:0,background:'#fff',boxShadow:'0 -2px 10px rgba(27,42,74,.05)',display:'flex',justifyContent:'space-around',padding:'10px 16px 24px',zIndex:100}}>
        {[
          {id:'dashboard', icon:'📊', label:'Accueil'},
          {id:'grimoire',  icon:'📚', label:'Grimoire'},
          {id:'repertoire',icon:'📂', label:'Sujets'},
          {id:'arene',     icon:'⚔️', label:'Arène'},
        ].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} className={`nav-btn ${tab===t.id?'active':''}`}
            style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,background:'none',border:'none',cursor:'pointer',opacity:tab===t.id?1:0.5}}>
            <span style={{fontSize:20}}>{t.icon}</span>
            <span style={{fontSize:10,fontWeight:600,color:'#1B2A4A'}}>{t.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
