<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>OralMed 2026 — Académie des Oraux</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        cream: '#F4F1EB',
        navy: '#1B2A4A',
        sage: '#5C7A62',
        gold: '#C9A84C',
        danger: '#A83232',
      },
      fontFamily: {
        display: ['"Playfair Display"', 'serif'],
        body: ['"DM Sans"', 'sans-serif'],
      }
    }
  }
}
</script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #F4F1EB;
  color: #1B2A4A;
  min-height: 100vh;
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #C9A84C55; border-radius: 4px; }

.hl {
  background: linear-gradient(105deg, #FAEDB5 0%, #F7E490 100%);
  padding: 1px 6px;
  border-radius: 3px;
}

.card {
  background: #fff;
  border-radius: 18px;
  box-shadow: 0 1px 3px rgba(27,42,74,.06), 0 4px 16px rgba(27,42,74,.05);
  transition: box-shadow .25s ease, transform .15s ease;
}
.card-hover:hover {
  box-shadow: 0 4px 24px rgba(27,42,74,.12);
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes slideRight {
  from { opacity:0; transform:translateX(-14px); }
  to   { opacity:1; transform:translateX(0); }
}
@keyframes popIn {
  0%   { opacity:0; transform:scale(.85) translateY(8px); }
  65%  { transform:scale(1.04) translateY(-2px); }
  100% { opacity:1; transform:scale(1) translateY(0); }
}
@keyframes pulse {
  0%,100% { opacity:1; }
  50%      { opacity:.6; }
}

.anim-up   { animation: fadeUp   .45s ease both; }
.anim-side { animation: slideRight .4s ease both; }
.anim-pop  { animation: popIn    .4s ease both; }
.anim-pulse{ animation: pulse 2s ease infinite; }

.acc-body {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows .38s ease;
}
.acc-body.open { grid-template-rows: 1fr; }
.acc-inner { overflow: hidden; }

.timer-ring {
  transition: stroke-dashoffset 1s linear, stroke .6s ease;
  transform: rotate(-90deg);
  transform-origin: 70px 70px;
}

.check-row {
  display: flex; align-items: flex-start; gap: 10px;
  cursor: pointer; padding: 6px 0;
  border-bottom: 1px solid #F3F4F6;
  transition: opacity .2s;
}
.check-row:last-child { border-bottom: none; }
.check-row.checked { opacity: .55; }
.check-row.checked .check-label { text-decoration: line-through; }
.check-box {
  flex-shrink: 0;
  margin-top: 2px;
  width: 20px; height: 20px;
  border-radius: 6px;
  border: 2px solid #D1D5DB;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s ease;
}
.check-box.on {
  border-color: #5C7A62;
  background: #5C7A62;
}

.tag {
  font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 20px;
  background: #F3F4F6; color: #6B7280;
  white-space: nowrap;
}
.tag.Urgence   { background:#FEE2E2; color:#B91C1C; }
.tag.Social    { background:#D1FAE5; color:#065F46; }
.tag.Relationnel { background:#DBEAFE; color:#1E40AF; }
.tag.Ethique   { background:#FEF3C7; color:#92400E; }
.tag.Sante     { background:#EDE9FE; color:#5B21B6; }
.tag.Medical   { background:#CFFAFE; color:#155E75; }
.tag.Familial  { background:#FCE7F3; color:#9D174D; }

.nav-btn { position: relative; transition: opacity .2s; }
.nav-btn.active::after {
  content:'';
  position: absolute;
  bottom: -1px; left: 50%;
  transform: translateX(-50%);
  width: 24px; height: 3px;
  border-radius: 2px;
  background: #1B2A4A;
}

.toggle-track {
  width: 46px; height: 26px; border-radius: 13px;
  background: #D1D5DB;
  position: relative; cursor: pointer;
  transition: background .25s ease;
}
.toggle-track.on { background: #1B2A4A; }
.toggle-thumb {
  position: absolute;
  top: 3px; left: 3px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: white;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
  transition: transform .25s ease;
}
.toggle-track.on .toggle-thumb { transform: translateX(20px); }

.mastery-select {
  border: none; outline: none;
  border-radius: 8px;
  font-size: 11px; font-weight: 600;
  padding: 4px 6px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}

.jury-toast {
  position: fixed;
  top: 20px; left: 50%;
  transform: translateX(-50%);
  z-index: 999;
  animation: popIn .4s ease both;
}

.btn {
  display: block; width: 100%;
  padding: 14px 20px;
  border-radius: 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 600;
  text-align: center;
  cursor: pointer;
  transition: opacity .2s, transform .15s;
  border: none; outline: none;
}
.btn:active { transform: scale(.97); opacity: .9; }
.btn-navy  { background: #1B2A4A; color: #fff; }
.btn-sage  { background: #5C7A62; color: #fff; }
.btn-ghost { background: #fff; color: #1B2A4A; box-shadow: 0 1px 3px rgba(27,42,74,.1); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

function App() {
  return (
    <div style={{padding: '40px 20px', textAlign: 'center'}}>
      <div style={{fontSize: 48, marginBottom: 20}}>📚</div>
      <h1 style={{fontFamily: 'Playfair Display, serif', fontSize: 32, color: '#1B2A4A', marginBottom: 10}}>OralMed 2026</h1>
      <p style={{fontSize: 18, color: '#6B7280', marginBottom: 30}}>Académie des Oraux</p>
      <div className="card" style={{maxWidth: 600, margin: '0 auto', padding: '30px', background: '#F9FAFB'}}>
        <p style={{fontSize: 16, color: '#4B5563', lineHeight: 1.6, marginBottom: 20}}>
          L'application est en cours de chargement...
        </p>
        <div style={{fontSize: 14, color: '#9CA3AF'}}>
          ✓ Interface prête<br/>
          ✓ Styles chargés<br/>
          ✓ Base de données initialisée
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
